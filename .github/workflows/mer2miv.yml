name: mer2miv
on:
  schedule:
    - cron: '0 */6 * * *'
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Run playlist update script
      run: npm start

    - name: Commit and push changes to GitHub
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # 添加文件
        git add IPV4.m3u chanels.gz
        
        # 检查状态并提交
        echo "=== Git Status ==="
        git status
        echo "=== Git Diff Staged ==="
        git diff --cached --stat
        
        if git diff --cached --quiet; then
          echo "⚠️ 没有检测到文件变化,跳过提交"
        else
          git commit -m "Update IPTV playlist - $(date +'%Y-%m-%d %H:%M')"
          echo "✅ 提交成功,开始推送..."
          git push
          echo "✅ 推送成功"
        fi

    - name: Clone Gitee Repo
      env:
        GITEE_USER: ${{ secrets.GITEE_USER }}
        GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        GITEE_REPO: ${{ secrets.GITEE_REPO }}
      run: |
        rm -rf gitee-repo
        git clone "https://${GITEE_USER}:${GITEE_TOKEN}@gitee.com/${GITEE_USER}/${GITEE_REPO}.git" gitee-repo

    - name: Sync Files to Gitee
      env:
        GITEE_USER: ${{ secrets.GITEE_USER }}
        GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        GITEE_REPO: ${{ secrets.GITEE_REPO }}
      run: |
        cd gitee-repo
        git config user.name "GitHub Actions Bot"
        git config user.email "actions@users.noreply.github.com"

        git checkout main 2>/dev/null || git checkout -b main
        git pull origin main --rebase || true
        mkdir -p res

        cp ../chanels.gz ./res/
        cp ../htsrc.gz ./res/

        git add res/chanels.gz res/htsrc.gz

        git commit -m "Auto sync from GitHub to res dir - $(date +'%Y-%m-%d %H:%M:%S')" || echo "没有更改需要提交"
        git push origin main

