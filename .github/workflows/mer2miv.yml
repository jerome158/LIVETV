name: mer2miv
on:
  schedule:
    - cron: '0 */1 * * *'
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Run playlist update script
      run: npm start

    - name: Commit and push changes to GitHub
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add IPV4.m3u chanels.gz
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update IPTV playlist - $(date +'%Y-%m-%d %H:%M')" && git push)

    - name: Clone Gitee Repo
      env:
        GITEE_USER: ${{ secrets.GITEE_USER }}
        GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        GITEE_REPO: ${{ secrets.GITEE_REPO }}
      run: |
        rm -rf gitee-repo
        git clone "https://${GITEE_USER}:${GITEE_TOKEN}@gitee.com/${GITEE_USER}/${GITEE_REPO}.git" gitee-repo

    - name: Sync Files to Gitee
      env:
        GITEE_USER: ${{ secrets.GITEE_USER }}
        GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        GITEE_REPO: ${{ secrets.GITEE_REPO }}
      run: |
        cd gitee-repo
        git config user.name "GitHub Actions Bot"
        git config user.email "actions@users.noreply.github.com"
        git checkout master 2>/dev/null || git checkout main
        cp ../IPV4.m3u ./
        cp ../chanels.gz ./
        git add IPV4.m3u chanels.gz
        git commit -m "Auto sync from GitHub - $(date +'%Y-%m-%d %H:%M:%S')" || echo "没有更改需要提交"
        git push "https://${GITEE_USER}:${GITEE_TOKEN}@gitee.com/${GITEE_USER}/${GITEE_REPO}.git"
